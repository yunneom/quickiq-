version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    groups:
      next:
        patterns:
          - 'next'
          - 'eslint-config-next'
          - '@next/*'
      sentry:
        patterns:
          - '@sentry/*'
      vercel:
        patterns:
          - '@vercel/*'
      supabase:
        patterns:
          - '@supabase/*'
      typescript:
        patterns:
          - 'typescript'
          - '@types/*'
      tailwind:
        patterns:
          - 'tailwindcss'
          - 'autoprefixer'
          - 'postcss'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Seoul
    open-pull-requests-limit: 3
