name: Vercel Preview Deploy

# Triggers Vercel preview deployments on PRs. Skipped automatically when
# VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID secrets are not set, so
# the workflow can sit in the repo before Vercel is connected.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Detect secrets
        id: gate
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Vercel secrets not configured — skipping preview deploy."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v6
        if: steps.gate.outputs.skip != 'true'

      - name: Set up Node.js
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Vercel CLI
        if: steps.gate.outputs.skip != 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment
        if: steps.gate.outputs.skip != 'true'
        run: vercel pull --yes --environment=preview --token=$VERCEL_TOKEN

      - name: Build Project Artifacts
        if: steps.gate.outputs.skip != 'true'
        run: vercel build --token=$VERCEL_TOKEN

      - name: Deploy Project to Vercel
        if: steps.gate.outputs.skip != 'true'
        run: vercel deploy --prebuilt --token=$VERCEL_TOKEN
