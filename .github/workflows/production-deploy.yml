name: Vercel Production Deploy

# Deploys main → production by POSTing a Vercel Deploy Hook.
#
# Why a deploy hook (not the Git integration): the project lives under a
# Hobby *team* on Vercel whose members don't include the repo's commit
# authors, so Vercel's automatic Git deploy is blocked with "commit author
# does not have contributing access". A Deploy Hook is triggered by the
# hook itself (the project owner), not the commit author, so it bypasses
# that check entirely. One secret, no token/CLI juggling.
#
# Setup (one time, by the project owner):
#   1. Vercel → project → Settings → Git → Deploy Hooks
#      → create a hook for branch `main`, copy the URL.
#   2. GitHub → repo → Settings → Secrets and variables → Actions
#      → New repository secret: VERCEL_DEPLOY_HOOK_URL = <that URL>
# After that, every push to main auto-triggers a production build.
#
# Skips cleanly (no failure) until the secret is configured.

on:
  push:
    branches: [main]

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
    steps:
      - name: Trigger Vercel production deploy
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL secret not set — skipping."
            echo "Add it under repo Settings → Secrets → Actions to enable auto-deploy."
            exit 0
          fi
          echo "Triggering Vercel production deploy hook…"
          status=$(curl -sS -o /tmp/hook_resp.json -w '%{http_code}' -X POST "$DEPLOY_HOOK_URL")
          echo "HTTP $status"
          cat /tmp/hook_resp.json || true
          echo ""
          # 2xx = accepted. Anything else fails the job so it's visible.
          case "$status" in
            2*) echo "✅ Deploy hook accepted — Vercel is building production." ;;
            *)  echo "❌ Deploy hook returned $status"; exit 1 ;;
          esac
